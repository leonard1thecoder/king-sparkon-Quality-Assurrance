name: JMeter Performance Tests

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: Backend base URL, for example https://api.example.com or http://localhost:8080
        required: true
        default: http://localhost:8080
      threads:
        description: Virtual users
        required: true
        default: '10'
      ramp_up_seconds:
        description: Ramp-up time in seconds
        required: true
        default: '30'
      duration_seconds:
        description: Test duration in seconds
        required: true
        default: '60'
      max_response_ms:
        description: Per-request max response time assertion
        required: true
        default: '1500'
      auth_token:
        description: Optional bearer token for secured endpoints
        required: false
        default: ''

jobs:
  jmeter:
    name: Run JMeter suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout QA repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Parse backend URL
        id: backend
        shell: bash
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          from urllib.parse import urlparse

          raw_url = os.environ["BACKEND_URL"].strip()
          parsed = urlparse(raw_url if "://" in raw_url else f"http://{raw_url}")
          scheme = parsed.scheme or "http"
          host = parsed.hostname or "localhost"
          port = parsed.port
          if port is None:
              port = "" if scheme in {"http", "https"} else "8080"

          print(f"protocol={scheme}")
          print(f"host={host}")
          print(f"port={port}")
          PY
        env:
          BACKEND_URL: ${{ inputs.backend_url }}

      - name: Run JMeter performance tests
        shell: bash
        run: |
          mvn -B -pl jmeter-performance-tests verify \
            -DtargetProtocol="${{ steps.backend.outputs.protocol }}" \
            -DtargetHost="${{ steps.backend.outputs.host }}" \
            -DtargetPort="${{ steps.backend.outputs.port }}" \
            -Dthreads="${{ inputs.threads }}" \
            -DrampUpSeconds="${{ inputs.ramp_up_seconds }}" \
            -DdurationSeconds="${{ inputs.duration_seconds }}" \
            -DmaxResponseMs="${{ inputs.max_response_ms }}" \
            -DauthToken="${{ inputs.auth_token }}"

      - name: Upload JMeter reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jmeter-performance-results
          path: |
            jmeter-performance-tests/target/jmeter
            jmeter-performance-tests/target/**/*.jtl
            jmeter-performance-tests/target/**/*.log
          if-no-files-found: warn
