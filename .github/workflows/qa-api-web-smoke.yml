name: QA API and Web Smoke

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: Backend API URL
        required: true
        default: https://king-sparkon-tracker-backend-75756350962.africa-south1.run.app
      frontend_url:
        description: Website frontend URL
        required: true
        default: http://localhost:3000
      api_auth_token:
        description: Optional backend auth token
        required: false
        default: ''
      browser:
        description: Selenium browser
        required: true
        default: chrome
        type: choice
        options:
          - chrome
          - firefox
          - edge
      upload_to_supabase:
        description: Upload Selenium screenshots to Supabase Storage
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  api-and-web-smoke:
    name: API and Selenium smoke
    runs-on: ubuntu-latest
    env:
      SUPABASE_UPLOAD_ENABLED: ${{ inputs.upload_to_supabase }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_BUCKET: ${{ secrets.SUPABASE_BUCKET }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout QA repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run backend API tests
        run: |
          mvn -B -am -pl backend-api-tests test \
            -Dapi.baseUrl="${{ inputs.backend_url }}" \
            -Dapi.authToken="${{ inputs.api_auth_token }}"

      - name: Run Selenium website tests and screenshots
        run: |
          mvn -B -am -pl selenium-web-e2e-tests test \
            -Dui.baseUrl="${{ inputs.frontend_url }}" \
            -Dui.browser="${{ inputs.browser }}" \
            -Dui.headless=true

      - name: Upload test reports and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-api-web-smoke-reports
          path: |
            backend-api-tests/target/surefire-reports
            backend-api-tests/target/qa-report
            selenium-web-e2e-tests/target/surefire-reports
            selenium-web-e2e-tests/target/qa-report
            selenium-web-e2e-tests/target/qa-screenshots
          if-no-files-found: warn
