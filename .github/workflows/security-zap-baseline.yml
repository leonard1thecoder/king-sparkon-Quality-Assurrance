name: Security ZAP Baseline

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Website or API base URL to scan
        required: true
        default: http://localhost:3000
      minutes:
        description: Spider duration in minutes
        required: true
        default: '1'

jobs:
  zap-baseline:
    name: OWASP ZAP baseline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout QA repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run ZAP baseline scan
        run: |
          mvn -B -am -pl security-tests -Pzap-baseline verify \
            -Dsecurity.targetUrl="${{ inputs.target_url }}" \
            -Dzap.minutes="${{ inputs.minutes }}"

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-reports
          path: |
            security-tests/target/zap
            security-tests/target/qa-report
          if-no-files-found: warn
